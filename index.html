<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hackathon UniAnchieta - 2º Lugar 🏆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Dancing+Script:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Montserrat', sans-serif;
  }

  .frame {
    background: linear-gradient(145deg, #ffd700, #ffb800, #ffd700);
    border-radius: 24px;
    padding: 6px;
    box-shadow: 0 0 60px rgba(255,215,0,0.5), 0 0 120px rgba(255,184,0,0.3);
    max-width: 900px;
    width: 100%;
  }

  .inner {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
    border-radius: 20px;
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }

  .inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(255,215,0,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Stars decoration */
  .stars {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    font-size: 14px;
    opacity: 0.6;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd700, #ffb800);
    color: #1a1a2e;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 20px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 5vw, 44px);
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Photo grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 12px;
    margin-bottom: 20px;
  }

  .photo-wrap {
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    border: 3px solid rgba(255,215,0,0.35);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.2s;
  }

  .photo-wrap:hover { transform: scale(1.02); }

  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Big photo spans full width */
  .photo-big {
    grid-column: 1 / -1;
    height: 300px;
  }

  /* Two small photos */
  .photo-sm {
    height: 220px;
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
  }

  /* Footer */
  .footer {
    text-align: center;
    border-top: 1px solid rgba(255,215,0,0.2);
    padding-top: 18px;
    position: relative;
  }

  .medal {
    font-size: 42px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.8));
  }

  .quote {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(16px, 3vw, 22px);
    color: #ffd700;
    margin-bottom: 6px;
  }

  .date {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .grupo-badge {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    color: #ffd700;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 14px;
    border-radius: 20px;
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    .photo-big { height: 220px; }
    .photo-sm { height: 160px; }
  }
</style>
</head>
